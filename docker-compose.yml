version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: legalservice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/legalservice
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  telegram_bot:
    build: ./telegram_bot
    env_file: ./backend/.env
    environment:
      API_BASE: http://backend:8000/api
    depends_on:
      - backend
    volumes:
      - ./telegram_bot:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host"

  # Крон-контейнер для напоминаний
  reminders:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/legalservice
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    # Запускает скрипт напоминаний каждые 30 минут
    command: sh -c "while true; do python reminders.py; sleep 1800; done"

volumes:
  postgres_data:
  uploads:
